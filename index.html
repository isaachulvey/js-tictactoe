<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css" />
    <title>Tic Tac Toe</title>
</head>
<body>
<header>
    <h1>Welcome to Tic Tac Toe!</h1>
    <h3 id="msg" aria-live="polite"></h3>
</header>

<main id="gameBoard">
    <button type="button" id="1" class="cell top lEdge" aria-label="Cell 1, empty"></button>
    <button type="button" id="2" class="cell top" aria-label="Cell 2, empty"></button>
    <button type="button" id="3" class="cell top rEdge" aria-label="Cell 3, empty"></button>
    <button type="button" id="4" class="cell lEdge" aria-label="Cell 4, empty"></button>
    <button type="button" id="5" class="cell" aria-label="Cell 5, empty"></button>
    <button type="button" id="6" class="cell rEdge" aria-label="Cell 6, empty"></button>
    <button type="button" id="7" class="cell bot lEdge" aria-label="Cell 7, empty"></button>
    <button type="button" id="8" class="cell bot" aria-label="Cell 8, empty"></button>
    <button type="button" id="9" class="cell bot rEdge" aria-label="Cell 9, empty"></button>
</main>
    <div class="controls">
        <button id="reset" onclick="reset()" aria-label="Reset game">Reset</button>
        <button id="aiToggle" aria-label="Toggle AI opponent">Play against AI</button>
        <button id="themeToggle" aria-label="Toggle dark mode">Dark Mode</button>
    </div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
